version: '3.8'

services:
  # Production web application
  ai-news-curator:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/ainewscurator}:latest
    container_name: ai-news-curator
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-news-network

  # Development version (optional)
  ai-news-curator-dev:
    build:
      context: .
      target: development
    container_name: ai-news-curator-dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    profiles:
      - dev
    networks:
      - ai-news-network

  # Nginx reverse proxy (optional)
  nginx-proxy:
    image: nginx:alpine
    container_name: ai-news-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - ai-news-curator
    restart: unless-stopped
    profiles:
      - proxy
    networks:
      - ai-news-network

networks:
  ai-news-network:
    driver: bridge

volumes:
  node_modules: 