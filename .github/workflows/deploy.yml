name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  schedule:
    # Hourly redeploy so the static news snapshot stays fresh
    - cron: '23 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NODE_VERSION: '18'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news snapshot
        # On failure the app falls back to fetching feeds live in the browser
        continue-on-error: true
        run: node scripts/fetch-news.js

      - name: Build application
        run: npm run build
        env:
          # CRA treats eslint warnings as errors when CI=true; keep them warnings
          CI: false

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
